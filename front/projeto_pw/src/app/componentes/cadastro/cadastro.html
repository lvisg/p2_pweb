<main class="container my-5 px-lg-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="card border-0 shadow-sm rounded-4 bg-white p-4 p-lg-5">

        <header class="mb-4 text-center text-md-start">
          <h3 class="fw-bold text-dark mb-1">Cadastro</h3>
          <p class="text-muted small">Preencha os campos abaixo com seus dados pessoais.</p>
          @if (mensagem) {
            <div class="alert alert-success border-0 py-2 small shadow-sm text-start" role="alert">
              <i class="bi bi-check-circle me-2"></i> {{ mensagem }}
            </div>
          }
        </header>

        <form class="row g-3">

          <div class="col-md-6">
            <label for="nome" class="form-label small fw-bold text-secondary">Nome</label>
            <input type="text" class="form-control rounded-pill px-3" id="nome" [(ngModel)]="nome" name="nome" placeholder="Seu nome">
          </div>
          <div class="col-md-6">
            <label for="sobrenome" class="form-label small fw-bold text-secondary">Sobrenome</label>
            <input type="text" class="form-control rounded-pill px-3" id="sobrenome" [(ngModel)]="sobrenome" name="sobrenome" placeholder="Seu sobrenome">
          </div>

          <div class="col-md-7">
            <label for="email" class="form-label small fw-bold text-secondary">E-mail</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0 rounded-start-pill"><i class="bi bi-envelope text-muted"></i></span>
              <input type="email" class="form-control rounded-end-pill border-start-0" id="email" [(ngModel)]="email" name="email" placeholder="email@exemplo.com">
            </div>
          </div>
          <div class="col-md-5">
            <label for="telefone" class="form-label small fw-bold text-secondary">Telefone</label>
            <input type="text" class="form-control rounded-pill px-3" id="telefone" [(ngModel)]="telefone" name="telefone" mask="(00) 00000-0000" placeholder="(00) 00000-0000">
          </div>

          <div class="col-md-6">
            <label for="cpf" class="form-label small fw-bold text-secondary">CPF</label>
            <input type="text" class="form-control rounded-pill px-3" id="cpf" [(ngModel)]="cpf" name="cpf" mask="000.000.000-00" placeholder="000.000.000-00">
          </div>
          <div class="col-md-6">
            <label for="senha" class="form-label small fw-bold text-secondary">Senha</label>
            <input type="password" class="form-control rounded-pill px-3" id="senha" [(ngModel)]="senha" name="senha" placeholder="Crie uma senha">
          </div>

          <input type="text" class="form-control rounded-pill px-3 border-primary shadow-sm" id="cep" [(ngModel)]="cep" (input)="buscar(cep)" name="cep" mask="00000-000" placeholder="00000-000">
          <div class="col-md-8">
            <label for="logradouro" class="form-label small fw-bold text-secondary">Logradouro</label>
            <input type="text" class="form-control rounded-pill px-3" id="logradouro" [(ngModel)]="logradouro" name="logradouro" placeholder="Rua, Avenida...">
          </div>

          <div class="col-md-3">
            <label for="numero" class="form-label small fw-bold text-secondary">Número</label>
            <input type="text" class="form-control rounded-pill px-3" id="numero" [(ngModel)]="numero" name="numero" placeholder="Ex: 123">
          </div>
          <div class="col-md-5">
            <label for="complemento" class="form-label small fw-bold text-secondary">Complemento</label>
            <input type="text" class="form-control rounded-pill px-3" id="complemento" [(ngModel)]="complemento" name="complemento" placeholder="Apt, Bloco...">
          </div>
          <div class="col-md-4">
            <label for="bairro" class="form-label small fw-bold text-secondary">Bairro</label>
            <input type="text" class="form-control rounded-pill px-3" id="bairro" [(ngModel)]="bairro" name="bairro" placeholder="Seu bairro">
          </div>

          <div class="col-md-8">
            <label for="cidade" class="form-label small fw-bold text-secondary">Cidade</label>
            <input type="text" class="form-control rounded-pill px-3" id="cidade" [(ngModel)]="cidade" name="cidade" placeholder="Cidade">
          </div>
          <div class="col-md-4">
            <label for="estado" class="form-label small fw-bold text-secondary">Estado</label>
            <input type="text" class="form-control rounded-pill px-3" id="estado" [(ngModel)]="estado" name="estado" placeholder="UF">
          </div>
          <div class="col-12 mt-4 pt-3 text-center">
            <button type="button" class="btn btn-primary btn-lg rounded-pill px-5 shadow fw-bold text-uppercase seletor-botao-cadastro"
                    (click)="cadastrar(nome,sobrenome,email,telefone,cpf,cep,logradouro,numero,complemento,bairro,cidade,senha,estado)">
              Finalizar Cadastro
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</main>
