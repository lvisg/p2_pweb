<main class="container my-5 px-lg-4">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">

      <div class="card border-0 shadow-sm rounded-4 bg-white p-4 p-lg-5">

        <header class="text-center mb-4">
          <h3 class="fw-bold text-dark mb-1">Validação de Token</h3>
          <p class="text-muted small">Insira o código de verificação que enviamos para o seu e-mail para prosseguir</p>
        </header>

        @if (mensagem) {
          <div class="alert alert-info border-0 py-2 small shadow-sm mb-4" id="id_alerta_token" role="alert">
            <i class="bi bi-info-circle me-2"></i> {{ mensagem }}
          </div>
        }

        <form class="row g-3">
          <div class="col-12 text-center">
            <label for="id_token_acesso" class="form-label small fw-bold text-secondary d-block text-start">Token de Acesso</label>
            <input type="text" class="form-control form-control-lg rounded-pill text-center estilizacao-input-token"
                   id="id_token_acesso" [(ngModel)]="token" name="token" placeholder="0000" maxlength="4">
          </div>

          <div class="col-12 mt-4">
            <button type="button" class="btn btn-primary btn-lg rounded-pill w-100 shadow-sm fw-bold text-uppercase seletor-botao-token"
                    (click)="validaToken(token)">
              Confirmar Token
            </button>
          </div>

          <div class="col-12 text-center mt-4 border-top pt-3">
            <span class="text-muted small d-block mb-2">Não recebeu o código?</span>
            <button type="button" id="id_botao_reenviar_codigo" class="btn btn-outline-primary rounded-pill w-100 py-2 fw-bold text-uppercase">
              Reenviar Código
            </button>
          </div>
        </form>

      </div>

    </div>
  </div>
</main>
